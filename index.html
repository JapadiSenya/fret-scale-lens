<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fret-scale-lens</title>
<meta name="description" content="弦楽器のフレットボード上の音名表示と、キー・スケールに対応するフレット位置をハイライト表示するツール">
<meta property="og:title" content="fret-scale-lens">
<meta property="og:description" content="弦楽器のフレットボード上の音名表示と、キー・スケールに対応するフレット位置をハイライト表示するツール">
<meta property="og:type" content="website">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app-header">
  <h1>fret-scale-lens</h1>
</header>

<main>
  <section class="controls" aria-label="コントロール">
    <div class="control-group">
      <label for="key-select">キー</label>
      <select id="key-select"></select>
    </div>

    <div class="control-group">
      <label for="scale-select">スケール</label>
      <select id="scale-select"></select>
    </div>

    <div class="control-group">
      <label for="preset-select">チューニングプリセット</label>
      <select id="preset-select"></select>
    </div>

    <div class="control-group">
      <label for="display-mode-toggle">表示モード</label>
      <button id="display-mode-toggle" type="button" aria-pressed="false"></button>
    </div>

    <div class="control-group">
      <label for="master-volume">音量</label>
      <input type="range" id="master-volume" min="0" max="1" step="0.01">
    </div>

    <div class="control-group">
      <button id="tuning-detail-btn" type="button">チューニング詳細設定</button>
    </div>
  </section>

  <div id="legend" class="legend" aria-label="凡例"></div>

  <section id="fretboard-container" class="fretboard-container" aria-label="フレットボード"></section>

  <section id="tab-section" class="tab-section" aria-label="TAB譜">
    <div class="tab-toolbar">
      <div class="control-group">
        <label for="tab-title-input">曲名</label>
        <input type="text" id="tab-title-input">
      </div>

      <div class="control-group">
        <label for="tab-tempo-input">テンポ(BPM)</label>
        <input type="number" id="tab-tempo-input" min="20" max="300">
      </div>

      <div class="control-group">
        <label>音符長</label>
        <div id="duration-buttons" class="button-group"></div>
      </div>

      <div class="control-group">
        <label>入力</label>
        <div class="button-group">
          <button id="tab-rest-btn" type="button">休符</button>
          <button id="tab-ghost-btn" type="button" aria-pressed="false">ゴースト</button>
        </div>
      </div>

      <div class="control-group">
        <label>アーティキュレーション</label>
        <div class="button-group">
          <button id="tab-tie-btn" type="button">タイ</button>
          <button id="tab-hammer-pull-btn" type="button">H/P</button>
          <button id="tab-slide-btn" type="button">スライド</button>
        </div>
      </div>

      <div class="control-group">
        <label>編集</label>
        <div class="button-group">
          <button id="tab-delete-btn" type="button">削除</button>
          <button id="tab-undo-btn" type="button">元に戻す</button>
          <button id="tab-redo-btn" type="button">やり直す</button>
          <button id="tab-copy-btn" type="button">コピー</button>
          <button id="tab-paste-btn" type="button">貼り付け</button>
        </div>
      </div>

      <div class="control-group">
        <label>再生</label>
        <div class="button-group">
          <button id="tab-play-btn" type="button">再生</button>
          <button id="tab-metronome-btn" type="button" aria-pressed="false">メトロノーム</button>
          <button id="tab-octave-up-btn" type="button" aria-pressed="false">1オクターブ上で再生</button>
        </div>
      </div>

      <div class="control-group">
        <label>表示</label>
        <div class="button-group">
          <button id="tab-color-sync-btn" type="button" aria-pressed="false">スケール配色を反映</button>
        </div>
      </div>

      <div class="control-group">
        <label>ファイル</label>
        <div class="button-group">
          <button id="tab-export-btn" type="button">Export</button>
          <button id="tab-import-btn" type="button">Import</button>
          <input type="file" id="tab-import-input" accept="application/json" hidden>
        </div>
      </div>
    </div>

    <div id="tab-display" class="tab-display" aria-label="TAB譜表示"></div>
  </section>
</main>

<dialog id="tuning-dialog">
  <form method="dialog" class="tuning-form">
    <h2>チューニング詳細設定</h2>

    <div class="control-group">
      <label for="fret-count-input">フレット数</label>
      <input type="number" id="fret-count-input" min="1" max="36">
    </div>

    <div id="string-list" class="string-list"></div>

    <button type="button" id="add-string-btn">弦を追加</button>

    <div class="dialog-actions">
      <button type="submit">閉じる</button>
    </div>
  </form>
</dialog>

<script type="module" src="js/main.js"></script>
</body>
</html>
